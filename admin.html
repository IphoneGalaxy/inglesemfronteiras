<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Inglês em Fronteiras</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="admin-page">

    <!-- LOGIN -->
    <div class="admin-login-container" id="loginSection">
        <div class="admin-login-card">
            <div class="admin-badge">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                    <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1Z" stroke="currentColor" stroke-width="2"/>
                    <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 style="font-family:'Sora',sans-serif;font-size:1.5rem;margin-bottom:8px;">Acesso Administrativo</h1>
            <p style="color:var(--text-gray);font-size:0.9rem;margin-bottom:32px;">Digite o codigo de acesso admin</p>
            <form class="admin-login-form" id="adminLoginForm">
                <div class="form-group">
                    <label for="adminCode">Codigo</label>
                    <div class="input-wrapper">
                        <input type="text" id="adminCode" placeholder="Codigo admin" required autofocus style="text-align:center;text-transform:uppercase;letter-spacing:2px;">
                    </div>
                </div>
                <p class="error-message" id="loginError">Acesso negado.</p>
                <button type="submit" class="btn btn-primary btn-block">Acessar Painel</button>
            </form>
            <a href="index.html" style="display:block;margin-top:16px;color:var(--text-gray);font-size:0.85rem;">← Voltar ao site</a>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="admin-dashboard" id="dashboardSection" style="display:none;">
        <aside class="admin-sidebar">
            <div style="margin-bottom:24px;">
                <span class="logo" style="font-family:'Sora',sans-serif;font-weight:800;color:white;text-decoration:none;">Inglês<span style="color:var(--primary);">emFronteiras</span></span>
            </div>
            <span class="admin-badge-small">🔐 Admin</span>
            <nav class="sidebar-nav">
                <span class="nav-item active" style="cursor:pointer;">📊 Dashboard</span>
                <a href="index.html" class="nav-item">🌐 Site</a>
                <a href="painel.html" class="nav-item">👤 Painel Aluno</a>
                <a href="#" onclick="logout()" class="nav-item">🚪 Sair</a>
            </nav>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <h1>Painel Administrativo</h1>
                <button class="btn btn-primary" onclick="loadDashboard()">Atualizar</button>
            </header>
            <div class="admin-stats" id="adminStats">
                <div class="stat-card-large"><div class="stat-header"><span>Alunos</span></div><div class="stat-value" id="statUsers">0</div></div>
                <div class="stat-card-large"><div class="stat-header"><span>Materiais</span></div><div class="stat-value" id="statMats">0</div></div>
                <div class="stat-card-large"><div class="stat-header"><span>Pagamentos Pendentes</span></div><div class="stat-value" id="statPay">0</div></div>
            </div>
            <div class="admin-section">
                <h2 style="font-family:'Sora',sans-serif;margin-bottom:16px;">➕ Adicionar Material</h2>
                <form id="addMaterialForm" style="display:flex;flex-direction:column;gap:12px;max-width:500px;">
                    <input type="text" id="matTitle" placeholder="Titulo" class="search-box" style="width:100%;">
                    <input type="text" id="matDesc" placeholder="Descricao" class="search-box" style="width:100%;">
                    <div style="display:flex;gap:12px;">
                        <select id="matType" class="search-box" style="flex:1;">
                            <option value="pdf">PDF</option><option value="video">Video</option><option value="audio">Audio</option><option value="image">Imagem</option><option value="other">Outro</option>
                        </select>
                        <select id="matPlan" class="search-box" style="flex:1;">
                            <option value="todos">Todos</option><option value="basico">Basico</option><option value="pro">Pro</option><option value="premium">Premium</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Adicionar</button>
                </form>
            </div>
            <div class="admin-section">
                <h2 style="font-family:'Sora',sans-serif;margin-bottom:16px;">📚 Materiais</h2>
                <div id="materialsList"></div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://rrfnfqlijjirxonhtpde.supabase.co';
        const SB_KEY = 'sb_publishable_QeFafO_4Bvz81jVsLO05ug_i42WClL6';
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let adminUser = null;

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('adminCode').value.trim().toUpperCase();
            const err = document.getElementById('loginError');
            err.classList.remove('show');
            const { data } = await sb.from('users').select('*').eq('access_code', code).eq('is_staff', true).single();
            if (!data) { err.classList.add('show'); return; }
            adminUser = data;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'flex';
            loadDashboard();
        });

        async function loadDashboard() {
            const { count: users } = await sb.from('users').select('*', { count: 'exact', head: true });
            const { count: mats } = await sb.from('materials').select('*', { count: 'exact', head: true });
            const { count: pay } = await sb.from('payments').select('*', { count: 'exact', head: true }).eq('status', 'pending');
            document.getElementById('statUsers').textContent = users || 0;
            document.getElementById('statMats').textContent = mats || 0;
            document.getElementById('statPay').textContent = pay || 0;

            const { data: materials } = await sb.from('materials').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('materialsList');
            list.innerHTML = (materials || []).map(m => `
                <div class="activity-item" style="margin-bottom:8px;">
                    <div class="activity-content">
                        <strong>${m.title}</strong>
                        <p>${m.file_type.toUpperCase()} | ${m.plan_level} | ${(m.created_at||'').slice(0,10)}</p>
                    </div>
                    <button onclick="delMat(${m.id})" class="btn-outline" style="color:#EF4444;border-color:#EF4444;font-size:0.8rem;padding:4px 10px;">X</button>
                </div>
            `).join('') || '<p style="color:var(--text-gray);">Nenhum material</p>';
        }

        document.getElementById('addMaterialForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('matTitle').value.trim();
            const desc = document.getElementById('matDesc').value.trim();
            const type = document.getElementById('matType').value;
            const plan = document.getElementById('matPlan').value;
            if (!title) return;
            const { error } = await sb.from('materials').insert({ title, description: desc, file_type: type, plan_level: plan, filename: title });
            if (!error) { loadDashboard(); document.getElementById('matTitle').value = ''; document.getElementById('matDesc').value = ''; }
        });

        async function delMat(id) { if (confirm('Deletar?')) { await sb.from('materials').delete().eq('id', id); loadDashboard(); } }
        function logout() { adminUser = null; location.reload(); }
    </script>
</body>
</html>
