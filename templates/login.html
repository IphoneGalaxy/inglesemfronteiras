<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — EnglishFlow</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F172A; --card: #1E293B; --text: #F1F5F9; --soft: #94A3B8;
      --primary: #3390EC; --border: #334155; --muted: #64748B;
    }
    [data-theme="light"] {
      --bg: #FFFFFF; --card: #F8FAFC; --text: #0F172A; --soft: #475569;
      --border: #E2E8F0; --muted: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 1.5rem;
      padding: 3rem 2rem; width: 100%; max-width: 420px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .login-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .login-sub { color: var(--soft); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }
    .login-input {
      width: 100%; padding: 0.9rem 1rem; text-align: center; font-size: 1.3rem;
      font-family: 'Space Grotesk', monospace; letter-spacing: 3px;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 0.75rem;
      color: var(--text); margin-bottom: 1rem; transition: border-color .2s;
      text-transform: uppercase;
    }
    .login-input:focus { border-color: var(--primary); outline: none; }
    .login-input::placeholder { color: var(--muted); letter-spacing: 2px; font-size: 0.8rem; }
    .login-btn {
      width: 100%; padding: 0.9rem; background: var(--primary); color: #fff;
      border: none; border-radius: 2rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .login-btn:hover { background: #2A7DD4; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(51,144,236,0.4); }
    .login-error { color: #DC2626; font-size: 0.85rem; margin-bottom: 1rem; }
    .login-back { display: block; margin-top: 1.5rem; color: var(--soft); font-size: 0.85rem; text-decoration: none; }
    .login-back:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">💬</div>
    <h1 class="login-title">Acessar Painel</h1>
    <p class="login-sub">Digite o codigo de acesso que voce recebeu no Telegram para entrar no seu painel de estudos.</p>

    {% if error %}
    <p class="login-error">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <input type="text" name="code" class="login-input" placeholder="EX: A1B2C3D4" maxlength="8" required autofocus>
      <button type="submit" class="login-btn">Entrar no painel</button>
    </form>

    <a href="/" class="login-back">← Voltar para o site</a>
  </div>
</body>
</html>
