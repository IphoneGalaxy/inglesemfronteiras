<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — EnglishFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0F172A; --card: #1E293B; --text: #F1F5F9; --soft: #94A3B8; --primary: #3390EC; --border: #334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .admin-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 1.5rem;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .admin-icon { font-size: 3rem; margin-bottom: 1rem; }
    .admin-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
    .admin-sub { color: var(--soft); font-size: 0.85rem; margin-bottom: 2rem; }
    .admin-input {
      width: 100%; padding: 0.8rem 1rem; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 0.75rem; color: var(--text); font-size: 1rem; margin-bottom: 1rem;
      text-align: center; transition: border-color .2s;
    }
    .admin-input:focus { border-color: var(--primary); outline: none; }
    .admin-btn {
      width: 100%; padding: 0.8rem; background: var(--primary); color: #fff;
      border: none; border-radius: 2rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .admin-btn:hover { background: #2A7DD4; }
    .admin-error { color: #DC2626; font-size: 0.85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="admin-card">
    <div class="admin-icon">🔐</div>
    <h1 class="admin-title">Admin EnglishFlow</h1>
    <p class="admin-sub">Digite a senha para acessar o painel administrativo.</p>
    {% if error %}<p class="admin-error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="password" name="password" class="admin-input" placeholder="Senha" required autofocus>
      <button type="submit" class="admin-btn">Entrar</button>
    </form>
  </div>
</body>
</html>
