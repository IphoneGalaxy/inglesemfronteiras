<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — EnglishFlow</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg: #0F172A; --card: #1E293B; --text: #F1F5F9; --soft: #94A3B8; --primary: #3390EC; --primary-light: rgba(51,144,236,0.1); --border: #334155; --muted: #64748B; --gold: #FFD700; --green: #22C55E; }
    [data-theme="light"] { --bg: #F1F5F9; --card: #FFFFFF; --text: #0F172A; --soft: #475569; --border: #E2E8F0; --muted: #94A3B8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-logo { font-size: 1.5rem; }
    .header-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; }
    .header-user { font-size: 0.85rem; color: var(--soft); }
    .plan-badge { background: var(--primary); color: #fff; padding: 0.3rem 0.8rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }
    .btn-sm { background: var(--bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.85rem; color: var(--soft); transition: all .2s; }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .content { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
    .welcome h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .welcome p { color: var(--soft); line-height: 1.6; }
    .welcome-meta { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
    .progress-box { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; margin: 1.25rem 0; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
    .progress-pct { color: var(--primary); font-size: 0.8rem; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 4px; width: 0%; transition: width 0.5s; }
    .progress-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .cert-link { color: var(--gold); font-size: 0.85rem; text-decoration: none; font-weight: 500; display: inline-block; margin-top: 0.5rem; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    .mat-card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; transition: all .2s; position: relative; display: flex; flex-direction: column; gap: 0.75rem; }
    .mat-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.2); transform: translateY(-2px); }
    .mat-icon { font-size: 2rem; width: 3rem; height: 3rem; border-radius: 0.75rem; background: var(--primary-light); display: flex; align-items: center; justify-content: center; }
    .mat-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 1rem; }
    .mat-desc { color: var(--soft); font-size: 0.85rem; line-height: 1.5; }
    .mat-meta { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; }
    .mat-type { background: var(--primary-light); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 0.5rem; font-weight: 500; }
    .mat-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.7rem; background: var(--primary); color: #fff; border: none; border-radius: 1.5rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-decoration: none; transition: all .2s; font-family: 'Inter', sans-serif; margin-top: 0.5rem; }
    .mat-btn:hover { background: #2A7DD4; box-shadow: 0 4px 15px rgba(51,144,236,0.4); }
    .mat-btn.done { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }
    .mat-btn.undone { background: transparent; border: 1px solid var(--primary); color: var(--primary); font-size: 0.8rem; }
    .check-badge { position: absolute; top: 0.75rem; right: 0.75rem; font-size: 1.2rem; }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--soft); }
    .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
    .loading { text-align: center; padding: 3rem; color: var(--soft); }
    .toast { position: fixed; bottom: 1rem; right: 1rem; background: var(--green); color: #fff; padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.85rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 999; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="header-logo">💬</span>
      <div>
        <div class="header-title">EnglishFlow</div>
        <div class="header-user" id="userName">...</div>
      </div>
    </div>
    <div class="header-right">
      <span class="plan-badge" id="planBadge">...</span>
      <button class="btn-sm" onclick="toggleTheme()">🌓</button>
      <button class="btn-sm" onclick="logout()">Sair</button>
    </div>
  </header>

  <main class="content">
    <div class="welcome">
      <h2 id="welcomeTitle">👋 Ola!</h2>
      <p>Bem-vindo ao seu painel de estudos. Aqui voce encontra todos os materiais do seu plano.</p>
      <p class="welcome-meta" id="welcomeMeta"></p>
      <div class="progress-box">
        <div class="progress-header">
          <span>📊 Seu progresso</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-sub" id="progressSub">0/0 materiais concluidos</div>
      </div>
      <a href="/certificado" class="cert-link">🎓 Ver meu certificado</a>
    </div>

    <div id="materialsGrid" class="grid" style="margin-top:1.5rem;">
      <div class="loading">Carregando materiais...</div>
    </div>

    <div class="toast" id="toast"></div>
  </main>

  <script>
    const SB_URL = 'https://rrfnfqlijjirxonhtpde.supabase.co';
    const SB_KEY = 'sb_publishable_QeFafO_4Bvz81jVsLO05ug_i42WClL6';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // Auth check
    const user = JSON.parse(localStorage.getItem('ef_user') || 'null');
    if (!user) { window.location.href = '/login'; }

    // Render user info
    document.getElementById('userName').textContent = user.name;
    document.getElementById('planBadge').textContent = user.plan.toUpperCase();
    document.getElementById('welcomeTitle').textContent = `👋 Ola, ${user.name.split(' ')[0]}!`;
    document.getElementById('welcomeMeta').innerHTML = `📌 Plano: <strong>${user.plan.toUpperCase()}</strong> | 🔑 Codigo: <strong>${user.access_code}</strong>`;

    async function loadMaterials() {
      const grid = document.getElementById('materialsGrid');
      try {
        // Buscar materiais
        const { data: mats, error: matErr } = await sb
          .from('materials')
          .select('*')
          .or(`plan_level.eq.todos,plan_level.eq.${user.plan}`)
          .order('created_at', { ascending: false });

        if (matErr) { grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Erro ao carregar: ${matErr.message}</p></div>`; return; }

        // Buscar progresso
        const { data: progress } = await sb
          .from('material_progress')
          .select('material_id')
          .eq('user_id', user.id)
          .eq('completed', true);

        const completedIds = new Set((progress || []).map(p => p.material_id));

        if (!mats || mats.length === 0) {
          grid.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><p class="empty-text">Nenhum material disponivel ainda.<br>Novos conteudos serao adicionados em breve!</p></div>';
          updateProgress(0, 0);
          return;
        }

        updateProgress(mats.length, completedIds.size);

        grid.innerHTML = mats.map(m => {
          const isDone = completedIds.has(m.id);
          const icons = { pdf: '📄', video: '🎬', audio: '🎧', image: '🖼️', other: '📁' };
          const icon = icons[m.file_type] || '📁';
          const date = m.created_at ? m.created_at.slice(0, 10) : '';
          return `
            <article class="mat-card">
              ${isDone ? '<span class="check-badge">✅</span>' : ''}
              <div class="mat-icon">${icon}</div>
              <h3 class="mat-title">${escapeHtml(m.title)}</h3>
              ${m.description ? `<p class="mat-desc">${escapeHtml(m.description.slice(0, 120))}${m.description.length > 120 ? '...' : ''}</p>` : ''}
              <div class="mat-meta">
                <span class="mat-type">${m.file_type.toUpperCase()}</span>
                <span>${date}</span>
              </div>
              <a href="#" onclick="toggleProgress(${m.id}, ${isDone}); return false;" class="mat-btn ${isDone ? 'done' : 'undone'}">
                ${isDone ? '✅ Concluido — desmarcar' : '☐ Marcar como concluido'}
              </a>
            </article>
          `;
        }).join('');
      } catch (e) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Erro: ${e.message}</p></div>`;
      }
    }

    async function toggleProgress(materialId, currentlyDone) {
      try {
        if (currentlyDone) {
          await sb.from('material_progress').delete().eq('user_id', user.id).eq('material_id', materialId);
        } else {
          await sb.from('material_progress').upsert({
            user_id: user.id,
            material_id: materialId,
            completed: true,
            completed_at: new Date().toISOString()
          });
        }
        showToast(currentlyDone ? 'Desmarcado' : '✅ Concluido!');
        loadMaterials();
      } catch (e) {
        showToast('Erro ao atualizar');
      }
    }

    function updateProgress(total, done) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressSub').textContent = `${done}/${total} materiais concluidos`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function logout() { localStorage.removeItem('ef_user'); window.location.href = '/login'; }
    function toggleTheme() {
      const html = document.documentElement;
      const cur = html.getAttribute('data-theme') || 'dark';
      html.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
    }

    loadMaterials();
  </script>
</body>
</html>
