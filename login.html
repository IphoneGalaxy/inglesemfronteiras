<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Inglês em Fronteiras</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="back-home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Voltar para o site
                </a>
                <h1 class="auth-title">Acessar Painel</h1>
                <p class="auth-subtitle">Digite o codigo de acesso que voce recebeu no Telegram</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="accessCode">Codigo de Acesso</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M7 11V7C7 4.23858 9.23858 2 12 2C14.7614 2 17 4.23858 17 7V11" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <input type="text" id="accessCode" placeholder="EX: A1B2C3D4" maxlength="8" required autofocus style="text-transform:uppercase;letter-spacing:2px;text-align:center;">
                    </div>
                </div>

                <p class="error-message" id="loginError">Codigo invalido. Verifique e tente novamente.</p>

                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span id="btnText">Entrar no painel</span>
                    <div class="spinner" id="spinner" style="display:none;width:20px;height:20px;"></div>
                </button>

                <div class="auth-divider">
                    <span>ou</span>
                </div>

                <a href="https://t.me/inglesemfronteiras_bot" target="_blank" class="btn btn-outline btn-block">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.643.135-.953l11.566-4.458c.538-.196 1.006.128.832.941z"/>
                    </svg>
                    Acessar via Telegram
                </a>
            </form>

            <div class="auth-footer">
                <p>Nao tem um codigo? <a href="https://t.me/inglesemfronteiras_bot" target="_blank">Fale com o bot</a></p>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://rrfnfqlijjirxonhtpde.supabase.co';
        const SB_KEY = 'sb_publishable_QeFafO_4Bvz81jVsLO05ug_i42WClL6';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const code = document.getElementById('accessCode').value.trim().toUpperCase();
            const errorEl = document.getElementById('loginError');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const submitBtn = document.getElementById('submitBtn');

            if (!code) return;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            submitBtn.disabled = true;
            errorEl.classList.remove('show');

            try {
                const { data, error } = await sb
                    .from('users')
                    .select('id, name, plan, access_code, is_staff, created_at')
                    .eq('access_code', code)
                    .eq('active', true)
                    .single();

                if (error || !data) {
                    errorEl.classList.add('show');
                } else {
                    localStorage.setItem('ef_user', JSON.stringify(data));
                    window.location.href = '/painel';
                }
            } catch (err) {
                errorEl.classList.add('show');
            } finally {
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
