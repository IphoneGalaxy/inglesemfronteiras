<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página não encontrada | EnglishFlow</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl);
      gap: var(--space-lg);
    }
    .error-page__emoji {
      font-size: 5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .error-page__code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1;
    }
    .error-page__title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--color-text);
    }
    .error-page__text {
      color: var(--color-text-soft);
      max-width: 400px;
      line-height: 1.7;
    }
    .error-page__actions {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

<main class="error-page">
  <div class="error-page__emoji" aria-hidden="true">💬</div>
  <div class="error-page__code">404</div>
  <h1 class="error-page__title">Oops! Essa conversa não existe.</h1>
  <p class="error-page__text">
    A página que você procura pode ter sido movida, deletada ou nunca existiu — assim como algumas conversas no Telegram 😅
  </p>
  <div class="error-page__actions">
    <a href="index.html" class="btn btn--telegram btn--lg">
      <span class="btn__icon">🏠</span>
      Voltar ao início
    </a>
    <a href="https://t.me/inglesemfronteiras_bot" class="btn btn--outline btn--lg" target="_blank" rel="noopener">
      <span class="btn__icon">💬</span>
      Falar no Telegram
    </a>
  </div>
</main>

</body>
</html>
