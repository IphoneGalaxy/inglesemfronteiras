<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado — EnglishFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root { --bg: #0F172A; --card: #1E293B; --text: #F1F5F9; --soft: #94A3B8; --primary: #3390EC; --border: #334155; --gold: #FFD700; --green: #22C55E; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .header a { color: var(--soft); text-decoration: none; font-size: 0.85rem; }
    .container { max-width: 800px; margin: 3rem auto; padding: 0 1.5rem; }
    .cert { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 3px solid var(--gold); border-radius: 1.5rem; padding: 3rem 2rem; text-align: center; position: relative; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .cert::before { content: '⭐'; position: absolute; top: 2rem; left: 2rem; font-size: 2rem; opacity: 0.3; }
    .cert::after { content: '⭐'; position: absolute; bottom: 2rem; right: 2rem; font-size: 2rem; opacity: 0.3; }
    .stars { font-size: 3rem; margin-bottom: 1rem; letter-spacing: 0.5rem; }
    .cert-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 2rem; color: var(--gold); margin-bottom: 0.5rem; }
    .cert-sub { color: var(--soft); font-size: 1.1rem; margin-bottom: 2rem; }
    .cert-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; padding: 0.5rem 0; border-bottom: 2px solid var(--gold); display: inline-block; }
    .cert-progress { margin: 1.5rem 0; }
    .cert-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; max-width: 300px; margin: 0.5rem auto; }
    .cert-fill { height: 100%; background: var(--green); border-radius: 5px; transition: width 0.5s; }
    .cert-details { margin: 2rem 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .cert-detail { text-align: center; }
    .cert-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .cert-lbl { font-size: 0.8rem; color: var(--soft); margin-top: 0.25rem; }
    .cert-footer { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--soft); font-size: 0.8rem; }
    @media (max-width: 500px) { .cert-details { grid-template-columns: 1fr; } }
    .loading { text-align: center; padding: 5rem; color: var(--soft); }
  </style>
</head>
<body>
  <header class="header">
    <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;">💬 EnglishFlow</span>
    <a href="/painel">← Voltar ao painel</a>
  </header>
  <div class="container" id="certContainer">
    <div class="loading">Carregando certificado...</div>
  </div>

  <script>
    const SB_URL = 'https://rrfnfqlijjirxonhtpde.supabase.co';
    const SB_KEY = 'sb_publishable_QeFafO_4Bvz81jVsLO05ug_i42WClL6';
    const sb = supabase.createClient(SB_URL, SB_KEY);
    const user = JSON.parse(localStorage.getItem('ef_user') || 'null');
    if (!user) { window.location.href = '/login'; }

    async function loadCert() {
      const { count: total } = await sb.from('materials').select('*', { count: 'exact', head: true })
        .or(`plan_level.eq.todos,plan_level.eq.${user.plan}`);
      const { data: progress } = await sb.from('material_progress').select('material_id')
        .eq('user_id', user.id).eq('completed', true);
      const done = (progress || []).length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      document.getElementById('certContainer').innerHTML = `
        <div class="cert">
          <div class="stars">⭐⭐⭐⭐⭐</div>
          <h1 class="cert-title">Certificado de Proficiencia</h1>
          <p class="cert-sub">EnglishFlow — Ingles com Professores Nativos</p>
          <div class="cert-name">${user.name}</div>
          <div class="cert-progress">
            <div class="cert-bar"><div class="cert-fill" style="width:${pct}%;"></div></div>
            <span style="font-size:0.8rem;color:var(--soft);">${pct}% concluido — ${done}/${total} modulos</span>
          </div>
          <div class="cert-details">
            <div class="cert-detail"><div class="cert-val">${user.plan.toUpperCase()}</div><div class="cert-lbl">Plano</div></div>
            <div class="cert-detail"><div class="cert-val">${done}</div><div class="cert-lbl">Modulos</div></div>
            <div class="cert-detail"><div class="cert-val">${pct}%</div><div class="cert-lbl">Progresso</div></div>
          </div>
          <div class="cert-footer">
            🇧🇷 EnglishFlow — Aprenda ingles com nativos americanos<br>
            Codigo do aluno: <strong>${user.access_code}</strong>
          </div>
        </div>
      `;
    }
    loadCert();
  </script>
</body>
</html>
